services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  # SignalR backplane: every broadcast on any backend replica is published here
  # and fanned out to all other replicas so every connected browser gets it.
  redis:
    image: redis:8.6.2
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (.NET 10 minimal API) ────────────────────────────────────────────
  mes-backend:
    build:
      context: ../mes-backend
    restart: unless-stopped
    extra_hosts:
      # Lets containers resolve host.docker.internal → host machine IP so they
      # can reach Postgres and Keycloak which are Docker containers exposed on
      # the host's ports (5432 and 8080).
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      Authentication__Authority:             ${KEYCLOAK_AUTHORITY}
      Authentication__BackchannelAuthority:  ${KEYCLOAK_BACKCHANNEL_AUTHORITY}
      Authentication__Audience:             ${KEYCLOAK_CLIENT_ID}
      Redis__ConnectionString: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend (nginx + Vue SPA) ───────────────────────────────────────────────
  mes-frontend:
    build:
      context: ../mes-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    depends_on:
      - mes-backend

volumes:
  redis_data:
